name: Frontend CI/CD Workflow

on:
  pull_request:
    branches:
      - main
    types:
      - closed
    paths:
      - "front/**"
      - ".github/workflows/**"

  workflow_dispatch:

jobs:
  # --------------------------------------------------------------------
  # 0) TAG CREATION ----------------------------------------------------
  # --------------------------------------------------------------------
  tag-creation:
    name: 0. Automatic Creation Process of New Tags
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    outputs:
      created_tag: ${{ steps.created_tag.outputs.created_tag }}
      change_type: ${{ steps.change_type.outputs.change_type }}

    steps:
      - uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: sudo apt-get install -y gh

      - name: Extract type of change from PR
        id: change_type
        run: |
          echo "${{ github.event.pull_request.body }}" > body.txt

          change_type=""
          if grep -q "\[x\] novo-marco" body.txt; then
            change_type="novo-marco"
          elif grep -q "\[x\] nova-feature" body.txt; then
            change_type="nova-feature"
          elif grep -q "\[x\] bug-fix" body.txt; then
            change_type="bug-fix"
          elif grep -q "\[x\] outros" body.txt; then
            change_type="outros"
          else
            echo "No option scheduled correctly in 'change_type:'"
            exit 1
          fi

          echo "change_type=$change_type" >> "$GITHUB_OUTPUT"

      - name: Get the last release tag
        id: last_tag
        run: |
          gh auth setup-git
          tag=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          if [[ -z "$tag" ]]; then tag="0.0.0"; fi
          echo "last_tag=$tag" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Calculate new tag
        id: created_tag
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.last_tag.outputs.last_tag }}"
          case "${{ steps.change_type.outputs.change_type }}" in
            bug-fix|outros)
              patch=$((patch + 1))
              ;;
            nova-feature)
              minor=$((minor + 1))
              patch=0
              ;;
            novo-marco)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
          esac
          created_tag="${major}.${minor}.${patch}"
          echo "New tag: $created_tag"
          echo "created_tag=$created_tag" >> "$GITHUB_OUTPUT"

  # --------------------------------------------------------------------
  # 2) FRONTEND DOCKER -------------------------------------------------
  # --------------------------------------------------------------------
  frontend-docker:
    name: 2. Frontend CI/CD
    runs-on: ubuntu-latest
    needs: tag-creation
    env:
      CREATED_TAG: ${{ needs.tag-creation.outputs.created_tag }}
    if: >
      (github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      packages: write
      security-events: write
    defaults:
      run:
        working-directory: front

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/horas-discentes-frontend:$CREATED_TAG \
            -f Dockerfile .

      - name: Tag image as latest
        run: |
          docker tag ghcr.io/${{ github.repository_owner }}/horas-discentes-frontend:$CREATED_TAG \
                     ghcr.io/${{ github.repository_owner }}/horas-discentes-frontend:latest

      - name: Docker Login (DockerHub for Scout)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Install Docker Scout
        run: |
          curl -fsSL https://raw.githubusercontent.com/docker/scout-cli/main/install.sh -o install-scout.sh
          sh install-scout.sh

      - name: Scan image for critical vulnerabilities
        run: |
          docker scout cves --only-severity critical --exit-code ghcr.io/${{ github.repository_owner }}/horas-discentes-frontend:$CREATED_TAG
          docker scout quickview ghcr.io/${{ github.repository_owner }}/horas-discentes-frontend:$CREATED_TAG

      - name: Push Docker images (version and latest)
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/horas-discentes-frontend:$CREATED_TAG
          docker push ghcr.io/${{ github.repository_owner }}/horas-discentes-frontend:latest


  # --------------------------------------------------------------------
  # 3) RELEASE CREATION ------------------------------------------------
  # --------------------------------------------------------------------
  release-creation:
    name: 3. Automatic Creation Process of New Releases
    runs-on: ubuntu-latest
    needs: [tag-creation, frontend-docker]
    env:
      CREATED_TAG: ${{ needs.tag-creation.outputs.created_tag }}
      CHANGE_TYPE: ${{ needs.tag-creation.outputs.change_type }}
    steps:
      - uses: actions/checkout@v4

      - name: Release Publication
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.CREATED_TAG }}
          name: Release ${{ env.CREATED_TAG }}
          generate_release_notes: true
          body: |
            Release gerada automaticamente da Pull Request #${{ github.event.pull_request.number }}
            Tipo de mudança: ${{ env.CHANGE_TYPE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
