services:
  frontend:
    image: ghcr.io/ifpebj-ti/horas-discentes-frontend:latest
    ports:
      - "${PORT_MACHINE_FRONTEND}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
    networks:
      - rede-back
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: ghcr.io/ifpebj-ti/horas-discentes-backend:latest
    ports:
      - "${PORT_MACHINE_BACKEND}:5000"
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=${DATABASE_URL}
      - JWT__Key=${JWT__Key}
      - JWT__Issuer=${JWT__Issuer}
      - JWT__Audience=${JWT__Audience}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - EMAIL__Remetente=${EMAIL__Remetente}
      - EMAIL__Senha=${EMAIL__Senha}
      - EMAIL__Smtp=${EMAIL__Smtp}
      - EMAIL__Porta=${EMAIL__Porta}
      - COORDENADOR_CONVITE_LINK=${COORDENADOR_CONVITE_LINK}
      - FileStorage__Endpoint=http://minio:9000
      - FileStorage__AccessKey=${MINIO_ROOT_USER}
      - FileStorage__SecretKey=${MINIO_ROOT_PASSWORD}
      - FileStorage__BucketName=certificados
      - FileStorage__UseSSL=false
    volumes:
      - backend_data_protection_keys:/root/.aspnet/DataProtection-Keys
    networks:
      - rede-back
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: horas-discentes-db
    ports:
      - "${PORT_MACHINE_DB}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - rede-back
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: horas-discentes-minio
    ports:
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - rede-back
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: horas-discentes-minio-init
    networks:
      - rede-back
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/certificados;
        echo 'Bucket certificados pronto.';
      "
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    restart: on-failure

volumes:
  pgdata:
  backend_data_protection_keys:
  minio_data:

networks:
  rede-back:
